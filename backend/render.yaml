services:
  - type: web
    name: mianwu-backend
    env: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_NAME
        value: 面悟
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./mianwu.db
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://token-plan-cn.xiaomimimo.com/v1
      - key: LLM_MODEL
        value: mimo-v2.5-pro
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 120
      - key: SMTP_SERVER
        value: smtp.qq.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM_NAME
        value: 面悟